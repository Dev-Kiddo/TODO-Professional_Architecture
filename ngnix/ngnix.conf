events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://client:3000;
        }

        location /api/users {
            proxy_pass http://user-service:5001;
        }

        location /api/todos {
            proxy_pass http://user-service:5002;
        }
    }
}